<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
font-size:14px;
margin:0;
padding:10px;
}

.card{
background:white;
max-width:500px;
width:100%;
margin:30px auto;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
box-sizing:border-box;
}

.logo{
width:140px;
max-width:60%;
height:auto;
margin-bottom:10px;
}

.title{
font-size:22px;
font-weight:bold;
color:green;
margin-bottom:10px;
}

b{color:green;}

#result p{
margin:6px 0;
}

/* Mobile optimization */
@media (max-width:600px){

.card{
padding:20px;
}

.title{
font-size:18px;
}

.logo{
width:110px;
}

}

</style>

</head>

<body>

<div class="card">

<img class="logo" src="ty.jpg">

<div class="title">TY International School</div>

<div id="result">Checking certificate...</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

fetch("https://opensheet.elk.sh/1O4mVRuM6u5FdHtL4wuMQbUTRrwvFW6YjEFdlK82l-Xw/Certificates")
.then(res => res.json())
.then(data => {

let cert = data.find(c => c.CertificateID === id);

if(cert){

document.getElementById("result").innerHTML = `
<h3 style="color:blue;">Certificate Verified ✅</h3>
<table>
<tr><td><b>Certificate ID:</b></td> <td>${cert.CertificateID}</p></td></tr>
<td><b>Name:</b></td><td> ${cert.Name}</td>
<td><b>Gender:</b></td><td> ${cert.Gender}</td>
<td><b>Date of Birth:</b></td><td> ${cert.DOB}</td>
<td><b>Place of Birth:</b></td><td> ${cert.Place}</td>
<td><b>Course:</b></td><td> ${cert.Course}</td>
<td><b>Issue Date:</b></td><td> ${cert.Issue}</td>
<td><b>Status:</b></td><td> ${cert.Status}</td>
</table>
`;

}else{

document.getElementById("result").innerHTML =
"<br>❌ Certificate Not Found!";

}

});

</script>

</body>
</html>
